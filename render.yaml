services:
  - type: web
    name: furniforge-pro
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: furniforge-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        value: "8850062243:AAGwoRUpMi2twuYrhqNzZBhLPvZjHAfeROo"
      - key: TELEGRAM_ADMIN_CHAT_ID
        value: "6089586932"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

databases:
  - name: furniforge-db
    plan: free
    region: frankfurt
