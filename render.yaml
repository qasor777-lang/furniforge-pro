services:
  - type: web
    name: furniforge-pro
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: furniforge-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

  - type: pserv
    name: furniforge-pro-post-migrate
    env: node
    plan: free
    buildCommand: npm install
    startCommand: "echo 'migrate on deploy' && exit 0"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: furniforge-db
          property: connectionString

databases:
  - name: furniforge-db
    plan: free
    region: frankfurt
